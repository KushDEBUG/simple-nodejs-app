name: DevSecOps Security Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  checkov:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkov scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          quiet: true
          soft_fail: false

  terrascan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Terrascan scan
        uses: tenable/terrascan-action@v1
        with:
          iac_type: "terraform"
          iac_version: "v14"
          policy_type: "aws"
          iac_dir: "terraform/"
          only_warn: false

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Semgrep scan
        run: semgrep ci --config auto
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  snyk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Snyk scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  build-and-scan-image:
    runs-on: ubuntu-latest
    needs: [gitleaks, checkov, terrascan, semgrep, snyk]
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t simple-nodejs-app:${{ github.sha }} .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: simple-nodejs-app:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: ".trivyignore"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: simple-nodejs-app:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository owner
        run: |
          echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Tag and push image
        run: |
          docker tag simple-nodejs-app:${{ github.sha }} ghcr.io/${OWNER_LC}/simple-nodejs-app:${{ github.sha }}
          docker push ghcr.io/${OWNER_LC}/simple-nodejs-app:${{ github.sha }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes ghcr.io/${OWNER_LC}/simple-nodejs-app:${{ github.sha }}

      - name: Attest SBOM
        run: cosign attest --yes --predicate sbom.json --type cyclonedx ghcr.io/${OWNER_LC}/simple-nodejs-app:${{ github.sha }}
